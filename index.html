<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViAGO International</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --navy: #0a1628;
            --slate: #1e293b;
            --accent: #3b82f6;
            --accent-light: #60a5fa;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --white: #ffffff;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--navy);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 640px;
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 600;
            letter-spacing: 0.08em;
            color: var(--white);
            margin-bottom: 0.5rem;
        }

        .logo-text span {
            color: var(--accent-light);
        }

        .tagline {
            font-size: 1.125rem;
            color: var(--text-muted);
            margin-bottom: 3rem;
            letter-spacing: 0.02em;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: var(--accent);
            margin: 0 auto 3rem;
            opacity: 0.6;
        }

        .message {
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .sub-message {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .contact-link {
            display: inline-block;
            padding: 0.875rem 2rem;
            background: var(--accent);
            color: var(--white);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: 0.03em;
            border-radius: 6px;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .contact-link:hover {
            background: var(--accent-light);
            transform: translateY(-1px);
        }

        .footer {
            position: absolute;
            bottom: 2rem;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            opacity: 0.5;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container > * {
            animation: fadeUp 0.6s ease forwards;
            opacity: 0;
        }
        .container > *:nth-child(1) { animation-delay: 0.1s; }
        .container > *:nth-child(2) { animation-delay: 0.2s; }
        .container > *:nth-child(3) { animation-delay: 0.3s; }
        .container > *:nth-child(4) { animation-delay: 0.4s; }
        .container > *:nth-child(5) { animation-delay: 0.5s; }
        .container > *:nth-child(6) { animation-delay: 0.6s; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-text">Vi<span>AGO</span></div>
        <p class="tagline">Leadership Training &amp; Critical Thinking</p>
        <div class="divider"></div>
        <p class="message">Something new is on its way.</p>
        <p class="sub-message">We're building a new home for ViAGO International.<br>In the meantime, get in touch — we'd love to hear from you.</p>
        <a href="mailto:info@viagointernational.com" class="contact-link">Get in Touch</a>
    </div>
    <div class="footer">&copy; ViAGO Holdings Limited 2026. All rights reserved.</div>
</body>
</html>
